<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHTASK V1.0 | Gestão de Tarefas</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">
            <i class="fas fa-layer-group"></i> DASHTASK <span>V1.0</span>
        </div>
        <div class="controls">
            <select id="team-selector">
                <option value="personal">Minhas Tarefas (Pessoal)</option>
                <option value="equipe-ufma">Equipe STED/UFMA</option>
                <option value="grupo-alquimia">Grupo Alquimia</option>
            </select>
            <button class="btn-new" id="open-modal-btn"><i class="fas fa-plus"></i> Nova Tarefa</button>
        </div>
    </header>

    <main class="kanban">
        <section class="column" id="todo">
            <h2><i class="fas fa-thumbtack"></i> A FAZER</h2>
            <div class="drop-zone" id="list-todo"></div>
        </section>

        <section class="column" id="doing">
            <h2><i class="fas fa-clock"></i> FAZENDO</h2>
            <div class="drop-zone" id="list-doing"></div>
        </section>

        <section class="column" id="done">
            <h2><i class="fas fa-check-circle"></i> FEITO</h2>
            <div class="drop-zone" id="list-done"></div>
        </section>
    </main>

    <div id="modal-task" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2><i class="fas fa-edit"></i> Cadastrar Tarefa</h2>
            <form id="task-form">
                <input type="text" id="task-title" placeholder="O que precisa ser feito?" required>
                <textarea id="task-desc" placeholder="Detalhes da tarefa..."></textarea>
                
                <div class="form-grid">
                    <div class="field">
                        <label>Prioridade (1 a 5 estrelas):</label>
                        <div class="star-input">
                            <input type="radio" name="priority" value="5" id="p5"><label for="p5">★</label>
                            <input type="radio" name="priority" value="4" id="p4"><label for="p4">★</label>
                            <input type="radio" name="priority" value="3" id="p3"><label for="p3">★</label>
                            <input type="radio" name="priority" value="2" id="p2"><label for="p2">★</label>
                            <input type="radio" name="priority" value="1" id="p1" checked><label for="p1">★</label>
                        </div>
                    </div>
                    <div class="field">
                        <label>Data Limite:</label>
                        <input type="date" id="task-deadline" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-save">Criar Tarefa no Dashboard</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
