<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASHTASK V1.0 | Workspace</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-screen" class="auth-overlay">
        <div class="login-card">
            <i class="fas fa-layer-group logo-icon"></i>
            <h1>DASHTASK <span>V1.0</span></h1>
            <button id="btn-login-google" class="btn-google"><i class="fab fa-google"></i> Entrar com Google</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <div class="logo">DASHTASK <span>V1.0</span></div>
            <div class="header-right">
                <select id="team-selector" style="display:none;"><option value="personal">Pessoal</option></select>
                
                <div class="user-profile" id="profile-trigger">
                    <img id="user-photo" src="" alt="User">
                    <div id="user-menu" class="user-dropdown hidden">
                        <strong id="user-full-name"></strong>
                        <hr>
                        <button id="btn-logout-profile" class="btn-logout-action">Sair</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="main-container">
            <aside class="sidebar">
                <div class="sidebar-item active" onclick="selectTeam('personal', this)">
                    <i class="fas fa-user"></i> Minhas Tarefas
                </div>
                <h3>MEUS GRUPOS</h3>
                <ul id="groups-list"></ul>
                <button class="btn-sidebar" onclick="openGroupModal()">+ Novo Grupo</button>
            </aside>

            <main class="kanban-board">
                <section class="column" id="todo" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3>A FAZER</h3>
                    <div class="task-list" id="list-todo"></div>
                    <button class="add-task-btn" onclick="openTaskModal()">+ Add Tarefa</button>
                </section>
                <section class="column" id="doing" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3>FAZENDO</h3>
                    <div class="task-list" id="list-doing"></div>
                </section>
                <section class="column" id="done" ondrop="drop(event)" ondragover="allowDrop(event)">
                    <h3>CONCLUÍDO</h3>
                    <div class="task-list" id="list-done"></div>
                </section>
            </main>
        </div>

        <footer>Developed by <strong>Elzimar José de Carvalho Neto</strong>. &copy; 2026</footer>
    </div>

    <div id="modal-task" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-task-title">Tarefa</h2>
            <form id="task-form">
                <input type="hidden" id="edit-task-id">
                <input type="text" id="task-title" placeholder="Título" required>
                <textarea id="task-desc" placeholder="Descrição"></textarea>
                <div class="form-grid">
                    <div class="star-rating">
                        <input type="radio" name="priority" value="5" id="s5"><label for="s5">★</label>
                        <input type="radio" name="priority" value="4" id="s4"><label for="s4">★</label>
                        <input type="radio" name="priority" value="3" id="s3"><label for="s3">★</label>
                        <input type="radio" name="priority" value="2" id="s2"><label for="s2">★</label>
                        <input type="radio" name="priority" value="1" id="s1" checked><label for="s1">★</label>
                    </div>
                    <input type="date" id="task-deadline" required>
                </div>
                <button type="submit" class="btn-save">Salvar</button>
            </form>
        </div>
    </div>

    <div id="modal-group" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGroupModal()">&times;</span>
            <h2>Gerenciar Grupo</h2>
            <form id="group-form">
                <input type="hidden" id="edit-group-id">
                <input type="text" id="group-name" placeholder="Nome do Grupo" required>
                <div class="input-inline">
                    <input type="email" id="member-email" placeholder="E-mail do membro">
                    <button type="button" onclick="addMemberToList()">Add</button>
                </div>
                <ul id="temp-member-list"></ul>
                <button type="submit" class="btn-save">Salvar Grupo</button>
                <button type="button" id="btn-delete-group" class="btn-delete hidden" onclick="deleteCurrentGroup()">Deletar Grupo</button>
            </form>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
